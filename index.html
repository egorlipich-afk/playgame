<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Книга Символов | Настоящий Python 3</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Подключаем Skulpt (Python в браузере) -->
    <script src="https://skulpt.org/js/skulpt.min.js"></script>
    <script src="https://skulpt.org/js/skulpt-stdlib.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #FF5C21, #FF9E6D, #FFF0E5);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 40px 30px;
            transition: background 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body.bg-orange {
            background: linear-gradient(125deg, #FF5C21, #FFB085, #FFF4EE);
        }
        body.bg-blue {
            background: linear-gradient(125deg, #1E3A6F, #2E4C8C, #A5C0E0, #FFFFFF);
        }

        .book-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            perspective: 1200px;
        }

        .book-page {
            background: #FEF9EF;
            border-radius: 32px 16px 16px 32px;
            box-shadow: 25px 35px 55px rgba(0, 0, 0, 0.25), inset -2px -2px 5px rgba(0,0,0,0.02), inset 2px 2px 10px rgba(255,255,240,0.8);
            display: flex;
            flex-wrap: wrap;
            position: relative;
            overflow: hidden;
        }

        .book-page::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 45px;
            height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.08) 40%, rgba(255,255,245,0) 90%);
            border-radius: 32px 0 0 32px;
            pointer-events: none;
            z-index: 2;
        }

        .menu-sidebar {
            width: 280px;
            background: rgba(255, 245, 235, 0.7);
            backdrop-filter: blur(2px);
            padding: 30px 15px;
            border-right: 2px solid #FFCBA4;
            border-radius: 32px 0 0 32px;
            z-index: 3;
        }

        .menu-sidebar h2 {
            font-family: 'Glina Script em.', 'Segoe Script', cursive;
            font-size: 1.7rem;
            font-weight: 600;
            color: #2E4C8C;
            text-align: center;
            margin-bottom: 35px;
        }

        .menu-item {
            font-family: 'Glina Script em.', cursive;
            background: white;
            margin-bottom: 20px;
            padding: 14px 12px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border: 1px solid #FFCBA4;
            color: #2E4C8C;
            position: relative;
        }

        .menu-item.completed {
            background: #2E8B57;
            color: white;
            border-color: #1f6e46;
            box-shadow: 0 0 12px rgba(46, 139, 86, 0.4);
        }

        .menu-item.completed::after {
            content: "✓";
            position: absolute;
            right: 18px;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .menu-item:hover {
            transform: translateX(6px);
            background: #FFE0D0;
        }

        .lock-message {
            font-size: 0.8rem;
            background: #f0e2d8;
            border-radius: 18px;
            padding: 5px 12px;
            margin-top: 15px;
            text-align: center;
        }

        .content-area {
            flex: 1;
            background: rgba(46, 76, 140, 0.08);
            padding: 30px 35px;
            border-radius: 0 32px 32px 0;
            position: relative;
        }

        .glow-card {
            background: white;
            border-radius: 32px;
            padding: 28px 30px;
            box-shadow: 0 0 20px rgba(46, 76, 140, 0.5), 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(46,76,140,0.3);
            animation: softGlow 3s infinite alternate;
        }

        @keyframes softGlow {
            0% { box-shadow: 0 0 12px rgba(46, 76, 140, 0.3); }
            100% { box-shadow: 0 0 28px rgba(46, 76, 140, 0.7); }
        }

        .pixel-dust {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 5;
        }

        .pixel {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #FF5C21;
            opacity: 0.7;
            animation: floatPixel 4s linear infinite;
            border-radius: 1px;
        }

        @keyframes floatPixel {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translate(calc(-30px + 60px * var(--dirX)), calc(-80px - 40px * var(--dirY)));
                opacity: 0;
            }
        }

        .code-editor-container {
            background: #1E1F2C;
            border-radius: 24px;
            padding: 18px;
            margin-top: 20px;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #aaa;
            font-size: 12px;
        }

        .editor-wrapper {
            display: flex;
            background: #282C34;
            border-radius: 16px;
            overflow: hidden;
        }

        .line-numbers {
            background: #1E1F2C;
            padding: 15px 0;
            text-align: right;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 14px;
            color: #5C6370;
            user-select: none;
            border-right: 1px solid #3E4452;
            line-height: 1.5;
            min-width: 45px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .line-numbers span {
            padding-right: 12px;
            display: block;
        }

        .code-area {
            flex: 1;
            background: #282C34;
            color: #ABB2BF;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 14px;
            padding: 15px;
            border: none;
            resize: vertical;
            outline: none;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-wrap: break-word;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .run-btn, .reset-btn {
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-family: 'Glina Script em.', cursive;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s linear;
        }

        .run-btn {
            background: #2E4C8C;
            color: white;
        }

        .run-btn:hover {
            background: #FF5C21;
            transform: scale(0.97);
        }

        .reset-btn {
            background: #6c757d;
            color: white;
        }

        .reset-btn:hover {
            background: #dc3545;
            transform: scale(0.97);
        }

        .output-console {
            background: #0F0F1A;
            color: #00FFAA;
            border-radius: 18px;
            padding: 12px 18px;
            margin-top: 15px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
        }

        .level-selector {
            display: flex;
            gap: 12px;
            margin: 20px 0 10px;
            flex-wrap: wrap;
        }

        .level-btn {
            background: #e9ecef;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .level-btn.active {
            background: #2E4C8C;
            color: white;
            box-shadow: 0 0 8px rgba(46,76,140,0.5);
        }

        h3, h4 {
            color: #2E4C8C;
        }

        .task-text {
            background: #F8F3ED;
            padding: 14px;
            border-radius: 20px;
            margin: 15px 0;
            font-weight: 500;
            line-height: 1.4;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #ccc;
            margin: 12px 0;
            font-family: monospace;
        }

        @media (max-width: 880px) {
            .book-page {
                flex-direction: column;
            }
            .menu-sidebar {
                width: 100%;
                border-radius: 32px 32px 0 0;
                border-right: none;
                border-bottom: 2px solid #FFCBA4;
            }
            body {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body class="bg-orange">
<div class="book-wrapper">
    <div class="book-page">
        <div class="pixel-dust" id="pixelContainer"></div>
        <div class="menu-sidebar">
            <h2>📖 КНИГА СИМВОЛОВ</h2>
            <div id="menuList">
                <div class="menu-item" data-tab="slice">✂️ Полнейший срез</div>
                <div class="menu-item" data-tab="sapper">💣 Символьный сапёр</div>
                <div class="menu-item" data-tab="register">🔠 Регистровый детектор</div>
                <div class="menu-item" data-tab="constructor">🧩 Конструктор фраз</div>
                <div class="menu-item" data-tab="boss" id="bossMenu">👾 Финальный босс: ШИФР</div>
            </div>
            <div id="bossLockMsg" class="lock-message" style="display: none; background:#f0e2d8; padding:8px; border-radius:20px; margin-top:15px;">🔒 Ты еще недостаточно готов, возвращайся! Пройди базовые этапы других игр.</div>
        </div>
        <div class="content-area">
            <div class="glow-card" id="dynamicContent">
                <div style="text-align:center">Выбери раздел из меню слева</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Прогресс и состояние
    let completionStatus = { slice: false, sapper: false, register: false, constructor: false, boss: false };
    let activeDifficulty = { slice: 'base', sapper: 'base', register: 'base', constructor: 'base' };
    let currentTab = 'slice';
    let savedCodes = { slice: '', sapper: '', register: '', constructor: '', boss: '' };

    // Настройка Skulpt (Python в браузере)
    let pyOutput = "";
    
    function outf(text) {
        pyOutput += text;
    }
    
    function runPythonCode(code, callback) {
        pyOutput = "";
        Sk.configure({
            output: outf,
            read: function(filename) {
                return Sk.builtinFiles.files[filename];
            },
            __future__: Sk.python3
        });
        
        try {
            Sk.misceval.asyncToPromise(function() {
                return Sk.importMainWithBody('<stdin>', false, code, false);
            }).then(() => {
                callback(pyOutput);
            }, (err) => {
                let errStr = err.toString();
                callback("Ошибка: " + errStr);
            });
        } catch(e) {
            callback("Ошибка: " + e.toString());
        }
    }

    function updateMenuCompletion() {
        document.querySelectorAll('.menu-item').forEach(item => {
            let tab = item.dataset.tab;
            if (tab && completionStatus[tab]) item.classList.add('completed');
            else if (tab) item.classList.remove('completed');
        });
        const bossBlock = document.getElementById('bossLockMsg');
        const bossMenuItem = document.getElementById('bossMenu');
        const baseConditions = completionStatus.slice && completionStatus.sapper && completionStatus.register && completionStatus.constructor;
        if (baseConditions) {
            bossBlock.style.display = 'none';
            bossMenuItem.style.pointerEvents = 'auto';
            bossMenuItem.style.opacity = '1';
        } else {
            bossBlock.style.display = 'block';
            if (currentTab === 'boss' && !baseConditions) { currentTab = 'slice'; renderTab(); }
            bossMenuItem.style.pointerEvents = 'none';
            bossMenuItem.style.opacity = '0.6';
        }
    }

    function changeBackground(tabId) {
        document.body.classList.toggle('bg-blue', tabId === 'boss');
        document.body.classList.toggle('bg-orange', tabId !== 'boss');
    }

    function updateLineNumbers(editorId) {
        const textarea = document.getElementById(editorId);
        const lineNumbersDiv = document.getElementById(editorId + "-lines");
        if (textarea && lineNumbersDiv) {
            const lines = textarea.value.split('\n').length;
            let html = '';
            for (let i = 1; i <= Math.max(lines, 1); i++) {
                html += `<span>${i}</span>`;
            }
            lineNumbersDiv.innerHTML = html;
        }
    }

    function createCodeEditor(id, placeholderText = "") {
        return `
            <div class="code-editor-container">
                <div class="editor-header"><span>🐍 Python 3 (настоящий)</span></div>
                <div class="editor-wrapper">
                    <div class="line-numbers" id="${id}-lines"><span>1</span></div>
                    <textarea id="${id}" class="code-area" placeholder="${placeholderText}" rows="8"></textarea>
                </div>
                <div class="button-group">
                    <button class="run-btn" onclick="runCurrentValidation()">🚀 Запустить код</button>
                    <button class="reset-btn" onclick="resetCode('${id}')">🗑️ Сброс</button>
                </div>
                <div id="${id}-output" class="output-console">▶ Результат появится здесь</div>
            </div>
        `;
    }

    window.resetCode = function(editorId) {
        const textarea = document.getElementById(editorId);
        if (textarea) {
            textarea.value = "";
            savedCodes[editorId.replace('Code', '')] = "";
            updateLineNumbers(editorId);
            const outputDiv = document.getElementById(editorId + '-output');
            if (outputDiv) outputDiv.innerHTML = "▶ Код сброшен. Напишите свой код.";
        }
    };

    window.runCurrentValidation = function() {
        let editorId = null;
        if (currentTab === 'slice') editorId = 'sliceCode';
        else if (currentTab === 'register') editorId = 'registerCode';
        else if (currentTab === 'constructor') editorId = 'constructorCode';
        else if (currentTab === 'boss') editorId = 'bossCode';
        else if (currentTab === 'sapper' && activeDifficulty.sapper === 'hard') editorId = 'sapperCode';
        
        if (!editorId) {
            if (currentTab === 'sapper' && activeDifficulty.sapper === 'base') {
                // Ручной ввод для сапёра
                const answer = document.getElementById('sapperAnswer')?.value.trim();
                if (answer === "0,3,5,9,12,14" || answer === "0, 3, 5, 9, 12, 14") {
                    completionStatus.sapper = true;
                    document.getElementById('sapperMsg').innerHTML = "✅ Верно! Все мины обезврежены.";
                } else {
                    document.getElementById('sapperMsg').innerHTML = "❌ Неправильные индексы. Ожидается: 0, 3, 5, 9, 12, 14";
                }
                updateMenuCompletion();
                return;
            }
            return;
        }
        
        const code = document.getElementById(editorId).value;
        const outDiv = document.getElementById(editorId + '-output');
        outDiv.innerHTML = "⏳ Выполнение...";
        
        runPythonCode(code, (output) => {
            outDiv.innerHTML = "▶ Вывод:\n" + output;
            
            // Валидация
            if (currentTab === 'slice') {
                const words = output.toUpperCase().match(/[А-Я]{3,}/g) || [];
                const unique = [...new Set(words)];
                if (unique.length >= 4 && output.trim().length > 0) {
                    completionStatus.slice = true;
                    outDiv.innerHTML += "\n✅ Отлично! Найдено 4+ слов. Задание засчитано!";
                } else {
                    outDiv.innerHTML += `\n⚠️ Найдено слов: ${unique.length}, нужно минимум 4 различных слова.`;
                }
            }
            else if (currentTab === 'sapper' && activeDifficulty.sapper === 'hard') {
                if (output.includes("[0, 3, 5, 9, 12, 14]") || output.includes("0,3,5,9,12,14")) {
                    completionStatus.sapper = true;
                    outDiv.innerHTML += "\n🌟 Отлично! Сапёр обезврежен!";
                } else {
                    outDiv.innerHTML += "\n❌ Индексы не совпадают. Ожидается [0, 3, 5, 9, 12, 14]";
                }
            }
            else if (currentTab === 'register') {
                let expected = activeDifficulty.register === 'base' ? "Привет Мир" : "ПриветМир";
                if (output.includes(expected)) {
                    completionStatus.register = true;
                    outDiv.innerHTML += "\n✔ Регистровый детектор сработал!";
                } else {
                    outDiv.innerHTML += `\n❌ Ошибка. Ожидаемый результат: ${expected}`;
                }
            }
            else if (currentTab === 'constructor') {
                if (output.includes("программист") && output.includes("язык")) {
                    completionStatus.constructor = true;
                    outDiv.innerHTML += "\n🎉 Конструктор фраз собран!";
                } else {
                    outDiv.innerHTML += "\n❌ Нужно получить фразу 'программист язык'.";
                }
            }
            else if (currentTab === 'boss') {
                if (output.includes("Информатика рулит")) {
                    completionStatus.boss = true;
                    outDiv.innerHTML += "\n🏆 Босс повержен! Поздравляем!";
                } else {
                    outDiv.innerHTML += "\n❌ Расшифровка не удалась. Нужно получить 'Информатика рулит'.";
                }
            }
            updateMenuCompletion();
        });
    };

    function attachEventsToEditor(editorId) {
        const textarea = document.getElementById(editorId);
        if (textarea) {
            textarea.addEventListener('input', () => {
                updateLineNumbers(editorId);
                savedCodes[editorId.replace('Code', '')] = textarea.value;
            });
            updateLineNumbers(editorId);
        }
    }

    function renderSlice() {
        return `<h3>✂️ Полнейший срез</h3>
        <div class="task-text">🎯 Слово: <strong>САМОЛЕТОСТРОЕНИЕ</strong><br>Используя срезы, найдите минимум 4 различных слова.</div>
        ${createCodeEditor('sliceCode', 'Введите ваш код на Python 3')}
        <div class="level-selector"><button class="level-btn active" data-game="slice" data-lvl="base">Базовый уровень</button></div>`;
    }
    
    function renderSapper() {
        if (activeDifficulty.sapper === 'base') {
            return `<h3>💣 Символьный сапёр (Базовый)</h3>
            <div class="task-text">Строка: <strong>"ПИТОН ИНФОРМАТИКА"</strong><br>Найдите индексы всех гласных букв (А,Е,Ё,И,О,У,Ы,Э,Ю,Я). Индексация с 0.</div>
            <input type="text" id="sapperAnswer" class="input-field" placeholder="Введите индексы через запятую, например: 0,3,5">
            <button class="run-btn" onclick="runCurrentValidation()">✅ Проверить</button>
            <div id="sapperMsg" class="output-console"></div>
            <div class="level-selector"><button class="level-btn active" data-game="sapper" data-lvl="base">Базовый</button><button class="level-btn" data-game="sapper" data-lvl="hard">Повышенный</button></div>`;
        } else {
            return `<h3>💣 Символьный сапёр (Повышенный)</h3>
            <div class="task-text">Напишите программу, которая выводит индексы всех гласных в строке <strong>"ПИТОН ИНФОРМАТИКА"</strong>.</div>
            ${createCodeEditor('sapperCode', 'Введите ваш код')}
            <div class="level-selector"><button class="level-btn" data-game="sapper" data-lvl="base">Базовый</button><button class="level-btn active" data-game="sapper" data-lvl="hard">Повышенный</button></div>`;
        }
    }
    
    function renderRegister() {
        let baseTask = `<div class="task-text"><strong>Базовый уровень:</strong> Преобразуйте "пРиВеТ мИр" → "Привет Мир"</div>${createCodeEditor('registerCode', 'Введите код для базового уровня')}`;
        let hardTask = `<div class="task-text"><strong>Повышенный уровень:</strong> Преобразуйте "пРиВеТ мИр" → "ПриветМир" (удалить пробелы)</div>${createCodeEditor('registerCode', 'Введите код для повышенного уровня')}`;
        return `<h3>🔠 Регистровый детектор</h3>${activeDifficulty.register === 'base' ? baseTask : hardTask}
        <div class="level-selector"><button class="level-btn ${activeDifficulty.register === 'base' ? 'active' : ''}" data-game="register" data-lvl="base">Базовый</button><button class="level-btn ${activeDifficulty.register === 'hard' ? 'active' : ''}" data-game="register" data-lvl="hard">Повышенный</button></div>`;
    }
    
    function renderConstructor() {
        return `<h3>🧩 Конструктор фраз</h3>
        <div class="task-text">📦 Даны строки:<br><code>a = "про"</code><br><code>b = "грамист"</code><br><code>c = " язык"</code><br>Соберите фразу <strong>"программист язык"</strong>.</div>
        ${createCodeEditor('constructorCode', 'Введите ваш код')}
        <div class="level-selector"><button class="level-btn active" data-game="constructor" data-lvl="base">Базовый уровень</button></div>`;
    }
    
    function renderBoss() {
        if (!(completionStatus.slice && completionStatus.sapper && completionStatus.register && completionStatus.constructor)) {
            return `<h3>👾 Финальный босс: ЗАШИФРОВАНО</h3><p>🔐 «Ты еще недостаточно готов, возвращайся!»</p>`;
        }
        return `<h3>👾 Финальный босс: Расшифровка</h3>
        <div class="task-text">📟 Сообщение: <strong>“ТиЛУр ОФниАКИтАмР”</strong><br>→ <strong>"Информатика рулит"</strong></div>
        ${createCodeEditor('bossCode', 'Введите алгоритм расшифровки')}`;
    }

    function renderTab() {
        const container = document.getElementById('dynamicContent');
        let html = '';
        if (currentTab === 'slice') html = renderSlice();
        else if (currentTab === 'sapper') html = renderSapper();
        else if (currentTab === 'register') html = renderRegister();
        else if (currentTab === 'constructor') html = renderConstructor();
        else if (currentTab === 'boss') html = renderBoss();
        container.innerHTML = html;
        
        let editorId = null;
        if (currentTab === 'slice') editorId = 'sliceCode';
        else if (currentTab === 'register') editorId = 'registerCode';
        else if (currentTab === 'constructor') editorId = 'constructorCode';
        else if (currentTab === 'boss') editorId = 'bossCode';
        else if (currentTab === 'sapper' && activeDifficulty.sapper === 'hard') editorId = 'sapperCode';
        
        if (editorId && document.getElementById(editorId)) {
            if (savedCodes[editorId.replace('Code', '')]) document.getElementById(editorId).value = savedCodes[editorId.replace('Code', '')];
            attachEventsToEditor(editorId);
        }
        attachLevelEvents();
        changeBackground(currentTab);
    }

    function attachLevelEvents() {
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                let game = btn.dataset.game;
                let lvl = btn.dataset.lvl;
                if (game && lvl) {
                    activeDifficulty[game] = lvl;
                    renderTab();
                }
            };
        });
    }

    document.querySelectorAll('.menu-item').forEach(el => {
        el.addEventListener('click', () => {
            let tab = el.dataset.tab;
            if (tab === 'boss' && !(completionStatus.slice && completionStatus.sapper && completionStatus.register && completionStatus.constructor)) return;
            if (tab) { currentTab = tab; renderTab(); }
        });
    });

    function generatePixels() {
        const container = document.getElementById('pixelContainer');
        for(let i=0;i<85;i++) {
            let pix = document.createElement('div');
            pix.classList.add('pixel');
            let size = 4+Math.random()*6;
            pix.style.width = size+'px'; pix.style.height = size+'px';
            pix.style.left = Math.random() * 100 + '%';
            pix.style.top = Math.random() * 100 + '%';
            pix.style.setProperty('--dirX', Math.random()*2-1);
            pix.style.setProperty('--dirY', Math.random());
            pix.style.animationDuration = 2+Math.random()*5+'s';
            pix.style.background = `hsl(${Math.random()*30 + 20}, 100%, 55%)`;
            container.appendChild(pix);
        }
    }
    
    generatePixels();
    updateMenuCompletion();
    renderTab();
</script>
</body>
</html>
